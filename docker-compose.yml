networks:
  frontend:
    driver: ${NETWORKS_DRIVER}
  backend:
    driver: ${NETWORKS_DRIVER}

volumes:
  elasticsearch:
    driver: ${VOLUMES_DRIVER}
  go-mod-cache:
    driver: ${VOLUMES_DRIVER}
  go-build-cache:
    driver: ${VOLUMES_DRIVER}

#---------------------------------------------
# YAML Extension Fields (共享配置锚点)
#---------------------------------------------
x-php-fpm-common: &php-fpm-common
  build:
    context: ./services/php-fpm
    args: &php-fpm-build-args
      - CHANGE_SOURCE=${CHANGE_SOURCE}
      - INSTALL_XDEBUG=${PHP_FPM_INSTALL_XDEBUG}
      - XDEBUG_PORT=${PHP_FPM_XDEBUG_PORT}
      - INSTALL_MONGO=${PHP_FPM_INSTALL_MONGO}
      - INSTALL_PHPREDIS=${PHP_FPM_INSTALL_PHPREDIS}
      - INSTALL_MEMCACHED=${PHP_FPM_INSTALL_MEMCACHED}
      - INSTALL_OPCACHE=${PHP_FPM_INSTALL_OPCACHE}
      - INSTALL_EXIF=${PHP_FPM_INSTALL_EXIF}
      - INSTALL_MYSQLI=${PHP_FPM_INSTALL_MYSQLI}
      - INSTALL_PDO_MYSQL=${PHP_FPM_INSTALL_PDO_MYSQL}
      - INSTALL_SWOOLE=${PHP_FPM_INSTALL_SWOOLE}
      - INSTALL_IMAGE_OPTIMIZERS=${PHP_FPM_INSTALL_IMAGE_OPTIMIZERS}
      - INSTALL_IMAGEMAGICK=${PHP_FPM_INSTALL_IMAGEMAGICK}
      - INSTALL_FFMPEG=${PHP_FPM_FFMPEG}
      - INSTALL_PHALCON=${PHP_FPM_INSTALL_PHALCON}
      - PHALCON_VERSION=${PHALCON_VERSION}
      - INSTALL_PING=${PHP_FPM_INSTALL_PING}
      - INSTALL_PHPDECIMAL=${PHP_FPM_INSTALL_PHPDECIMAL}
      - PUID=${PHP_FPM_PUID}
      - PGID=${PHP_FPM_PGID}
      - IMAGEMAGICK_VERSION=${PHP_FPM_IMAGEMAGICK_VERSION}
      - CONTAINER_PROJECT_PATH=${CONTAINER_PROJECT_PATH}
      - INSTALL_COMPOSER=${INSTALL_COMPOSER}
  expose:
    - "9000"
  extra_hosts:
    - "dockerhost:${DOCKER_HOST_IP}"
  networks:
    - backend

services:
#---------------------------------------------
# Workspace 开发工具容器
#---------------------------------------------

### Workspace Utilities ##################################
  workspace:
    build:
      context: ./services/workspace
      args:
        - CHANGE_SOURCE=${CHANGE_SOURCE}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
        - PHP_VERSION=${WORKSPACE_PHP_VERSION}
        - INSTALL_XDEBUG=false
        - XDEBUG_PORT=${WORKSPACE_XDEBUG_PORT}
        - INSTALL_MONGO=${WORKSPACE_INSTALL_MONGO}
        - INSTALL_PHPREDIS=${WORKSPACE_INSTALL_PHPREDIS}
        - INSTALL_SWOOLE=${WORKSPACE_INSTALL_SWOOLE}
        - INSTALL_COMPOSER=${WORKSPACE_INSTALL_COMPOSER}
        - COMPOSER_VERSION=${WORKSPACE_COMPOSER_VERSION}
        - COMPOSER_REPO_PACKAGIST=${WORKSPACE_COMPOSER_REPO_PACKAGIST}
        - INSTALL_NODE=${WORKSPACE_INSTALL_NODE}
        - NODE_VERSION=${WORKSPACE_NODE_VERSION}
        - INSTALL_SUPERVISOR=${WORKSPACE_INSTALL_SUPERVISOR}
        - SHELL_OH_MY_ZSH=${SHELL_OH_MY_ZSH}
        - PUID=${WORKSPACE_PUID}
        - PGID=${WORKSPACE_PGID}
        - TZ=${TIMEZONE}
        - CONTAINER_PROJECT_PATH=${CONTAINER_PROJECT_PATH}
    volumes:
      - ${HOST_PROJECT_PATH}:${CONTAINER_PROJECT_PATH}
      - ./services/workspace/supervisord.d:/etc/supervisor/conf.d
    extra_hosts:
      - "dockerhost:${DOCKER_HOST_IP}"
    tty: true
    networks:
      - frontend
      - backend



# BEGIN Hyperf project: hyperf-classmate

  hyperf-classmate:
    build:
      context: ./services/workspace
      args:
        - CHANGE_SOURCE=${CHANGE_SOURCE}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
        - PHP_VERSION=8.3
        - INSTALL_XDEBUG=${WORKSPACE_INSTALL_XDEBUG}
        - XDEBUG_PORT=${WORKSPACE_XDEBUG_PORT}
        - INSTALL_MONGO=${WORKSPACE_INSTALL_MONGO}
        - INSTALL_PHPREDIS=${WORKSPACE_INSTALL_PHPREDIS}
        - INSTALL_SWOOLE=${WORKSPACE_INSTALL_SWOOLE}
        - INSTALL_COMPOSER=${WORKSPACE_INSTALL_COMPOSER}
        - COMPOSER_VERSION=${WORKSPACE_COMPOSER_VERSION}
        - COMPOSER_REPO_PACKAGIST=${WORKSPACE_COMPOSER_REPO_PACKAGIST}
        - INSTALL_NODE=${WORKSPACE_INSTALL_NODE}
        - NODE_VERSION=${WORKSPACE_NODE_VERSION}
        - INSTALL_SUPERVISOR=${WORKSPACE_INSTALL_SUPERVISOR}
        - SHELL_OH_MY_ZSH=${SHELL_OH_MY_ZSH}
        - PUID=${WORKSPACE_PUID}
        - PGID=${WORKSPACE_PGID}
        - TZ=${TIMEZONE}
        - CONTAINER_PROJECT_PATH=${CONTAINER_PROJECT_PATH}
    working_dir: '/develop/Hua/Projects/ClassMate/ClassMateServer'
    command: sh -lc 'php bin/hyperf.php start'
    volumes:
      - ${HOST_PROJECT_PATH}:${CONTAINER_PROJECT_PATH}
    extra_hosts:
      - "dockerhost:${DOCKER_HOST_IP}"
    ports:
      - "9502:9501"
    depends_on:
      - redis
    tty: true
    networks:
      - frontend
      - backend
# END Hyperf project: hyperf-classmate

#---------------------------------------------
# Docker 管理面板 (Hyperf + Swoole)
#---------------------------------------------

### Docker Panel #########################################
  docker-panel:
    build:
      context: ./docker-panel
      dockerfile: Dockerfile
    volumes:
      - ./docker-panel:/var/www/docker-panel
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/var/www/docker-develop
    working_dir: /var/www/docker-panel
    command: sh -lc 'sh start-panel.sh'
    ports:
      - "127.0.0.1:9501:9501"
    extra_hosts:
      - "dockerhost:${DOCKER_HOST_IP}"
    networks:
      - frontend
      - backend

