#---------------------------------------------
# Go Development Environment
#---------------------------------------------

### Go Development ########################################
  go:
    build:
      context: ./services/go
      args:
        - GO_VERSION=${GO_VERSION}
        - GOPROXY=${GOPROXY}
        - PUID=${GO_PUID}
        - PGID=${GO_PGID}
        - CONTAINER_PROJECT_PATH=${CONTAINER_PROJECT_PATH}
        - INSTALL_DELVE=${GO_INSTALL_DELVE}
    working_dir: ${CONTAINER_PROJECT_PATH}
    command: tail -f /dev/null
    volumes:
      - ${HOST_PROJECT_PATH}:${CONTAINER_PROJECT_PATH}
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/developer/.cache/go-build
    environment:
      - GO111MODULE=on
      - GOPROXY=${GOPROXY}
      - CGO_ENABLED=${GO_CGO_ENABLED}
      - TZ=${TIMEZONE}
    ports:
      - "${GO_HOST_PORT}:8080"
      - "${GO_DEBUG_PORT}:2345"
    extra_hosts:
      - "dockerhost:${DOCKER_HOST_IP}"
      - "host.docker.internal:host-gateway"
    tty: true
    networks:
      - frontend
      - backend

#---------------------------------------------
# Web Server
#---------------------------------------------

### NGINX Server #########################################
  nginx:
    build:
      context: ./services/nginx
      args:
        - CHANGE_SOURCE=${CHANGE_SOURCE}
        - PHP_UPSTREAM_CONTAINER=${NGINX_PHP_UPSTREAM_CONTAINER}
        - PHP_UPSTREAM_PORT=${NGINX_PHP_UPSTREAM_PORT}
    volumes:
      - ${NGINX_HOST_LOG_PATH}:/var/log/nginx
      - ${NGINX_SITES_PATH}:/etc/nginx/sites
      - ${NGINX_SSL_PATH}:/etc/nginx/ssl
      - ${HOST_PROJECT_PATH}:${CONTAINER_PROJECT_PATH}
      - ./docker-panel:/var/www/docker-panel
    ports:
      - "${NGINX_HOST_HTTP_PORT}:80"
      - "${NGINX_HOST_HTTPS_PORT}:443"
      - "7001:7001"
      - "7002:7002"
      - "8002:8002"
    depends_on:
      - php-fpm
      - redis
    networks:
      - frontend
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

