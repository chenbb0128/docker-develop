; OPcache 配置文件
; 注意: 实际的 opcache.so 扩展由 /usr/local/etc/php/conf.d/docker-php-ext-opcache.ini 加载

; =============================================
; 基础配置
; =============================================
opcache.enable=1
opcache.enable_cli=0

; =============================================
; 内存配置
; =============================================
; 共享内存大小 (MB)
opcache.memory_consumption=256

; 字符串驻留内存 (MB) - 用于存储类名、函数名等
opcache.interned_strings_buffer=16

; 最大缓存脚本数量
opcache.max_accelerated_files=30000

; 单个脚本最大大小 (0 = 无限制)
opcache.max_file_size=0

; =============================================
; 验证配置
; =============================================
; 是否检查脚本更新 (开发环境=1, 生产环境=0)
opcache.validate_timestamps=1

; 检查间隔秒数 (开发环境=0 实时检查, 生产环境=60+)
opcache.revalidate_freq=2

; 是否使用当前工作目录作为缓存键
; 1 = 相同文件名不同目录的脚本分开缓存 (更安全)
opcache.use_cwd=1

; =============================================
; 性能优化
; =============================================
; 快速关闭 (推荐开启)
opcache.fast_shutdown=1

; 保存注释 (某些框架如 Laravel/Symfony 需要)
opcache.save_comments=1

; =============================================
; PHP 8.0+ JIT 编译器
; =============================================
; JIT 缓冲区大小 (设为 0 禁用 JIT)
; 仅在 PHP 8.0+ 生效
opcache.jit_buffer_size=100M

; JIT 模式
; 1205 = tracing JIT (推荐 Web 应用)
; 1255 = 更激进的 tracing JIT
opcache.jit=1205
