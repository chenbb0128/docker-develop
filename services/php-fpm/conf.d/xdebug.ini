; Xdebug 配置文件
; 适用于 Xdebug 3.x (PHP 7.2+)
; 注意: 实际的 xdebug.so 扩展由 /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 加载

; =============================================
; 调试模式配置
; =============================================
; 可用模式: off, develop, debug, gcstats, profile, trace
; 多模式用逗号分隔，如: debug,develop
xdebug.mode=debug

; 客户端 (IDE) 连接配置
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.idekey=PHPSTORM

; 请求触发方式
; yes = 每个请求都触发调试
; trigger = 需要 XDEBUG_TRIGGER cookie/GET/POST 参数
xdebug.start_with_request=trigger

; 自动发现客户端 IP (不推荐生产使用)
xdebug.discover_client_host=false

; =============================================
; 开发辅助配置
; =============================================
; CLI 输出着色
xdebug.cli_color=1

; var_dump 输出限制 (-1 = 无限制)
xdebug.var_display_max_children=-1
xdebug.var_display_max_data=-1
xdebug.var_display_max_depth=-1

; =============================================
; 性能分析配置 (需要 mode=profile)
; =============================================
xdebug.output_dir=/tmp/xdebug
xdebug.profiler_output_name=cachegrind.out.%p

; =============================================
; 日志配置
; =============================================
; 日志级别: 0=关闭, 1=错误, 3=警告, 5=通信, 7=所有
xdebug.log_level=0
